name: Refrescar disponibilidad boutiques
# Regenera web/data.json desde SIMSS y despliega Pages en el mismo run
# (un push hecho con GITHUB_TOKEN no dispara deploy.yml, así que desplegamos aquí).
on:
  schedule:
    # Cada 10 min de 08:00 a 00:00 hora de España (verano CEST=UTC+2 → 06:00-22:00 UTC).
    # En invierno (CET=UTC+1) la ventana efectiva será 07:00-23:00; GitHub usa UTC fijo.
    - cron: '*/10 6-21 * * *'   # cada 10 min, 08:00 … 23:50 España
    - cron: '0 22 * * *'        # 00:00 España
  workflow_dispatch: {}
permissions:
  contents: write
  pages: write
  id-token: write
concurrency:
  group: pages
  cancel-in-progress: false
jobs:
  refresh:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Tests
        run: node --test
      - name: Regenerar data.json
        env:
          SIMSS_USER: ${{ secrets.SIMSS_USER }}
          SIMSS_PASS: ${{ secrets.SIMSS_PASS }}
          SHOPIFY_STORE: ${{ secrets.SHOPIFY_STORE }}
          SHOPIFY_CLIENT_ID: ${{ secrets.SHOPIFY_CLIENT_ID }}
          SHOPIFY_CLIENT_SECRET: ${{ secrets.SHOPIFY_CLIENT_SECRET }}
          SHOPIFY_API_VERSION: ${{ secrets.SHOPIFY_API_VERSION }}
          GEOCODE_MAX_NEW: '60'   # tope de direcciones nuevas a geocodificar por run
        run: node build/build-index.mjs
      - name: Commit histórico (si cambió)
        run: |
          if ! git diff --quiet -- web/data.json geocache.json; then
            git config user.name "pangasa-bot"
            git config user.email "bot@pangasa.local"
            git add web/data.json geocache.json
            git commit -m "data: refresco disponibilidad boutiques"
            git push
          else
            echo "Sin cambios en data.json"
          fi
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: web
      - id: deployment
        uses: actions/deploy-pages@v4
